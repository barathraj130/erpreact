version: '3.8'

services:
  # PostgreSQL Database
  database:
    image: postgres:15-alpine
    container_name: erp_database
    environment:
      POSTGRES_DB: ${DB_NAME:-erp_database}
      POSTGRES_USER: ${DB_USER:-erp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/backups:/backups
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-erp_user} -d ${DB_NAME:-erp_database}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp_network

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: erp_backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-erp_user}:${DB_PASSWORD:-secure_password_123}@database:5432/${DB_NAME:-erp_database}
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-your_32_byte_hex_encryption_key_must_be_64_characters_total_abcd1234}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/backups:/app/backups
      - ./backend/logs:/app/logs
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - erp_network
    restart: unless-stopped

  # Frontend Web Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: erp_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - erp_network
    restart: unless-stopped

  # Optional: pgAdmin (Database Management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: erp_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@erpsystem.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "5050:80"
    depends_on:
      - database
    networks:
      - erp_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  erp_network:
    driver: bridge
