[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --html=tests/reports/report.html
    --self-contained-html
    -p no:warnings
markers =
    smoke: quick sanity smoke tests
    auth: authentication tests
    dashboard: dashboard navigation tests
    invoice: sales invoice module tests
    purchase: purchase bill module tests
    employee: employee & HR module tests
    attendance: attendance & QR system tests
    finance: finance module (loans, lenders, chits, brokers)
    inventory: inventory & products tests
    suppliers: supplier management tests
    dayops: day operations & EOD flow tests
    reports: reports & ledger tests
    api: backend REST API smoke tests
